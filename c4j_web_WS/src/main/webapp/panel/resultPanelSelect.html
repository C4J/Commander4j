<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Setting the pages character encoding -->
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
	<meta http-equiv="cache-control" content="max-age=0">
	<meta http-equiv="cache-control" content="no-cache">
	<meta http-equiv="expires" content="-1">
	<meta http-equiv="expires" content="Tue, 01 Jan 1980 11:00:00 GMT">
	<meta http-equiv="pragma" content="no-cache">

	<!-- The meta viewport will scale my content to any device width -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	 <!-- Link to my stylesheet -->
	<link rel="stylesheet" href="stylesPanels.css">

	<title>Panel Menu</title>

	<script src="scriptPanels.js"></script> <!-- Link to the javascript file -->

	<style>
.tableFixHead2 {
	overflow-y: auto;
	/* make the table scrollable if height is more than 200 px  */
	height: 570px; /* gives an initial height of 200px to the table */
	width: 675px; /* gives an initial height of 200px to the table */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead2 thead th {
	position: sticky; /* make the table heads sticky */
	top: 0px;
	/* table head will be placed from the top of the table and sticks to it */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead3 {
	overflow-y: auto;
	/* make the table scrollable if height is more than 200 px  */
	height: 70px; /* gives an initial height of 200px to the table */
	width: 675px; /* gives an initial height of 200px to the table */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead3 thead th {
	position: sticky; /* make the table heads sticky */
	top: 0px;
	/* table head will be placed from the top of the table and sticks to it */
	margin-left: auto;
	margin-right: auto;
}

.grid-container {
	display: grid;
	flex-wrap: wrap;
	grid-template-columns: 220px 220px 220px;
	padding: 5px;
	align-content: center;
	justify-content: center;
}
</style>
</head>

<body onLoad="buildPanelTable()">

	<h1 id="heading" style="text-align:center">Panels</h1>

	<div class="tableFixHead2">

		<table id="selectedTable">
		  <thead>
		    <tr>
		      <th>Panelist</th>
		      <th style="background-color: white;" id="panelistValue">111111111111</th>
		    </tr>
		  </thead>
		</table>

		<table id="panelTable">
			<thead>
				<tr>
					<th>Panel ID</th>
					<th>Plant</th>
					<th>Description</th>
				</tr>
			</thead>
			<tbody id="panelsTable-output">
			</tbody>
		</table>
	</div>

	<div class="grid-container">
  		 <div class="grid-item" align="center"><button class="button" id="backButton" onclick="back()">&lt;Back</button></div>
  		 <div class="grid-item" align="center"><button class="button" id="refreshButton" onclick="refresh()">Refresh</button></div>
  		 <div class="grid-item" align="center"><button class="button" id="nextButton" onclick="next()">Next&gt;</button></div>
	</div>

</body>

<script>

document.getElementById('panelistValue').innerHTML = sessionStorage.getItem('selectedUsername');


	function buildPanelTable() {

		fetch(getContextPath()+"/Panels?status=Ready")
			.then(function(response) { return response.json(); })
			.then(function(panels) {
				let placeholder = document.querySelector("#panelsTable-output");
				let out = "";
				for (let panel of panels) {
					out += `
			<tr>
				<td style="color:black; background-color:#f0f8ff"><input type="radio" id="${panel.panelID}" name="panelSelectList" onchange="panelListSave('selectedPanel',${panel.panelID});panelListSave('selectedPanelPlant','${panel.plant}');" value="${panel.panelID}" ` + panelListGet('selectedPanel', panel.panelID,panel.plant) + `>  <label for="${panel.panelID}"> ${panel.panelID}</label></td>
				<td style="color:black; background-color:#f0f8ff">`+panel.plant+`</td>
				<td style="color:black; background-color:#f0f8ff">`+panel.description+`</td>
			</tr>`;
				}

				placeholder.innerHTML = out;
			})
	}


	function next()
	{
		var selectedPanel = sessionStorage.getItem('selectedPanel');

		if (selectedPanel !== null)
		{
			if (selectedPanel)
			{
				if (selectedPanel !== '')
				{
					window.location='resultTraySelect.html';
				}
			}
		}
	}

	function back()
	{
		window.location='resultUserSelect.html';
	}

	function refresh()
	{
		console.log('resultPanelSelect.html');
		location.reload();
	}

</script>

</html>
