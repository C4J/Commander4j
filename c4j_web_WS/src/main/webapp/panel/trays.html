<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Setting the pages character encoding -->
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
	<meta http-equiv="cache-control" content="max-age=0">
	<meta http-equiv="cache-control" content="no-cache">
	<meta http-equiv="expires" content="-1">
	<meta http-equiv="expires" content="Tue, 01 Jan 1980 11:00:00 GMT">
	<meta http-equiv="pragma" content="no-cache">

	<!-- The meta viewport will scale my content to any device width -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	 <!-- Link to my stylesheet -->
	 <link rel="stylesheet" href="stylesPanels.css">
	<title>Tray Menu</title>

	<script src="scriptTrays.js"></script> <!-- Link to the javascript file -->

</head>

<body onLoad="buildTrayTable()">

	<h1 id="heading" style="text-align:center">Trays</h1>

	<div class="tableFixHead">
		<table id="trayTable">
			<thead>
				<tr>
					<th>Tray Seq</th>
					<th>Description</th>
				</tr>
			</thead>
			<tbody id="trayTable-output">
			</tbody>
		</table>
	</div>

	<div class="grid-container">
  		 <div class="grid-item" align="center"><button class="button" onclick="confirmNewTray()">New Tray</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="editTrayRecord()">Edit Tray</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="confirmDeleteTray()">Delete Tray</button></div>
	</div>

	<div class="grid-container">
	  	<div class="grid-item" align="center"><button class="button" onclick="panelMenu()">&lt;Back</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="refreshTray()">Refresh List</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="sampleMenu()">Setup Samples&gt;</button></div>
	</div>

</body>

<script>

	document.getElementById('heading').innerHTML = "[Panel "+sessionStorage.getItem('selectedPanel')+"]";

	function setCheckedValue(radioObj, newValue) {
		if(!radioObj)
			return;
		var radioLength = radioObj.length;
		if(radioLength == undefined) {
			radioObj.checked = (radioObj.value == newValue.toString());
			return;
		}
		for(var i = 0; i < radioLength; i++) {
			radioObj[i].checked = false;
			if(radioObj[i].value == newValue.toString()) {
				radioObj[i].checked = true;
			}
		}
	}

	function getCheckedValue(radioObj) {
		if(!radioObj)
			return "";
		var radioLength = radioObj.length;
		if(radioLength == undefined)
			if(radioObj.checked)
				return radioObj.value;
			else
				return "";
		for(var i = 0; i < radioLength; i++) {
			if(radioObj[i].checked) {
				return radioObj[i].value;
			}
		}
		return "";
	}

	function buildTrayTable() {

		var selected = sessionStorage.getItem('selectedPanel');


		fetch(getContextPath()+"/Trays?panelID="+selected)
			.then(function(response) { return response.json(); })
			.then(function(trays) {
				let placeholder = document.querySelector("#trayTable-output");
				let out = "";
				for (let tray of trays) {
					out += `
			<tr>
				<td style="color:black; background-color:#f0f8ff"><input type="radio" id="${tray.traySequence}" name="traySelectList" onchange="trayListSave('selectedTray',${tray.trayID});trayListSave('selectedTraySeq',${tray.traySequence})" value="${tray.traySequence}" ` + trayListGet('selectedTray', tray.trayID,tray.traySequence) + `>  <label for="${tray.traySequence}"> ${tray.traySequence}</label></td>
				<td style="color:black; background-color:#f0f8ff">${tray.description}</td>
			</tr>`;
				}

				placeholder.innerHTML = out;
			})
	}


	function confirmNewTray() {
		var result =  confirm("Create new Tray ?");
		if (result == true)
		{
			newTray();
		}
	}

	function confirmDeleteTray() {

		var selectedTray = sessionStorage.getItem('selectedTraySeq');

		if (selectedTray !== null)
		{
			if (selectedTray)
			{
				if (selectedTray !== '')
				{
					var result =  confirm("*WARNING*\n\nDelete Tray ["+selectedTray+"] ? \n\n\This will remove any result you have already recorded for assigned samples.");
					if (result == true)
					{
						deleteTray();
					}
				}
			}
		}
	}
</script>

</html>
