<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Setting the pages character encoding -->
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
	<meta http-equiv="cache-control" content="max-age=0">
	<meta http-equiv="cache-control" content="no-cache">
	<meta http-equiv="expires" content="-1">
	<meta http-equiv="expires" content="Tue, 01 Jan 1980 11:00:00 GMT">
	<meta http-equiv="pragma" content="no-cache">

	<!-- The meta viewport will scale my content to any device width -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	 <!-- Link to my stylesheet -->
	<link rel="stylesheet" href="stylesPanels.css">
	<title>Panel Menu</title>

	<script src="scriptPanels.js"></script> <!-- Link to the javascript file -->
	<style type="text/css">
	.tableFixHead {
	overflow-y: auto;
	/* make the table scrollable if height is more than 200 px  */
	height: 485px; /* gives an initial height of 200px to the table */
	width: 675px; /* gives an initial height of 200px to the table */
	margin-left: auto;
	margin-right: auto;
}
	</style>

</head>

<body onLoad="buildPanelTable()">

<h1 style="text-align:center">Panels</h1>

	<div class="tableFixHead">
		<table id="panelTable">
			<thead>
				<tr>
					<th>Panel ID</th>
					<th>Plant</th>
					<th>Description</th>
					<th>Status</th>
				</tr>
			</thead>
			<tbody id="panelsTable-output">
			</tbody>
		</table>
	</div>
	<br>

	<div class="grid-container">
		 <div class="grid-item" align="center"></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="fastLoad()">Scan Samples</button></div>
	</div>

	<div class="grid-container">

  		 <div class="grid-item" align="center"><button class="button" onclick="confirmNewPanel()">New Panel</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="editPanelRecord()">Edit Panel</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="confirmDeletePanel()">Delete Panel</button></div>
	</div>



	<div class="grid-container">
	  	 <div class="grid-item" align="center"><button class="button" onclick="menu()">&lt;Back</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="refreshPanel()">Refresh List</button></div>

  		 <div class="grid-item" align="center"><button class="button" onclick="loadTrays()">Setup Trays&gt;</button></div>
	</div>

</body>

<script>

	function setCheckedValue(radioObj, newValue) {
		if(!radioObj)
			return;
		var radioLength = radioObj.length;
		if(radioLength == undefined) {
			radioObj.checked = (radioObj.value == newValue.toString());
			return;
		}
		for(var i = 0; i < radioLength; i++) {
			radioObj[i].checked = false;
			if(radioObj[i].value == newValue.toString()) {
				radioObj[i].checked = true;
			}
		}
	}

	function getCheckedValue(radioObj) {
		if(!radioObj)
			return "";
		var radioLength = radioObj.length;
		if(radioLength == undefined)
			if(radioObj.checked)
				return radioObj.value;
			else
				return "";
		for(var i = 0; i < radioLength; i++) {
			if(radioObj[i].checked) {
				return radioObj[i].value;
			}
		}
		return "";
	}

	function buildPanelTable() {

		fetch(getContextPath()+"/Panels?maxRows=24")
			.then(function(response) { return response.json(); })
			.then(function(panels) {
				let placeholder = document.querySelector("#panelsTable-output");
				let out = "";
				for (let panel of panels) {
					out += `
			<tr>
				<td><input type="radio" id="${panel.panelID}" name="panelSelectList" onchange="panelListSave('selectedPanel',${panel.panelID});panelListSave('selectedPanelPlant','${panel.plant}');panelListSave('selectedTray','');;panelListSave('selectedTraySeq','');" value="${panel.panelID}" ` + panelListGet('selectedPanel', panel.panelID,panel.plant) + `>  <label for="${panel.panelID}"> ${panel.panelID}</label></td>
				<td>`+panel.plant+`</td>
				<td>`+panel.description+`</td>
				<td style="color:`+getStatusColour(panel.status)+`">`+panel.status+`</td>
			</tr>`;
				}
				placeholder.innerHTML = out;
			})
	}

	function confirmNewPanel() {
		var result =  confirm("Create new Panel ?");
		if (result == true)
		{
		    panelListSave('panelStatus','Prepare');
			newPanel();
		}
	}

	function confirmDeletePanel() {
		var selectedPanel = sessionStorage.getItem('selectedPanel');

		if (selectedPanel !== null)
		{
			if (selectedPanel)
			{
				if (selectedPanel !== '')
				{
					var result =  confirm("*WARNING*\n\nDelete Panel ["+selectedPanel+"] ? \n\n\This will remove any result you have already recorded for assigned samples.");
					if (result == true)
					{
						deletePanel();
					}
				}
			}
		}
	}

	function menu()
	{
		window.location='menu.html';
	}

</script>

</html>
