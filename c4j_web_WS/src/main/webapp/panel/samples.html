<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Setting the pages character encoding -->
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
	<meta http-equiv="cache-control" content="max-age=0">
	<meta http-equiv="cache-control" content="no-cache">
	<meta http-equiv="expires" content="-1">
	<meta http-equiv="expires" content="Tue, 01 Jan 1980 11:00:00 GMT">
	<meta http-equiv="pragma" content="no-cache">

	<!-- The meta viewport will scale my content to any device width -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	 <!-- Link to my stylesheet -->
	 <link rel="stylesheet" href="stylesPanels.css">
	<title>Load Samples</title>

	<script src="scriptTrays.js"></script>
	<script src="scriptSamples.js"></script> <!-- Link to the javascript file -->

	<style>
.tableFixHead2 {
	overflow-y: auto;
	/* make the table scrollable if height is more than 200 px  */
	height: 480px; /* gives an initial height of 200px to the table */
	width: 675px; /* gives an initial height of 200px to the table */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead2 thead th {
	position: sticky; /* make the table heads sticky */
	top: 0px;
	/* table head will be placed from the top of the table and sticks to it */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead3 {
	overflow-y: auto;
	/* make the table scrollable if height is more than 200 px  */
	height: 70px; /* gives an initial height of 200px to the table */
	width: 675px; /* gives an initial height of 200px to the table */
	margin-left: auto;
	margin-right: auto;
}

.tableFixHead3 thead th {
	position: sticky; /* make the table heads sticky */
	top: 0px;
	/* table head will be placed from the top of the table and sticks to it */
	margin-left: auto;
	margin-right: auto;
}

.grid-container {
	display: grid;
	flex-wrap: wrap;
	grid-template-columns: 220px 220px;
	padding: 5px;
	align-content: center;
	justify-content: center;
}
</style>

</head>

<body onLoad="buildSampleTable();setFocusScanData();">

	<h1 style="text-align:center">Load Samples</h1>

	<div class="tableFixHead2">

		<table id="selectedTable">
		  <thead>
		    <tr>
		      <th style="font-size: 26px; text-align: centre; padding-right: 8px;"><b>Panel</b></th>
		      <td id="panelValue" style="font-size: 26px; text-align: centre; padding-left: 8px;"><b>1234</b></td>

		      <th style="font-size: 26px; text-align: centre; padding-right: 8px;"><b>Tray</b></th>
		      <td id="traySeqValue" style="font-size: 26px; text-align: centre; padding-left: 8px;"><b>4567</b></td>
		    </tr>
		  </thead>
		</table>

		<table id="sampleTable">
			<thead>
				<tr>
					<th style="width:10%">Sample</th>
					<th>Sequence</th>
				</tr>
			</thead>
			<tbody id="sampleTable-output">
			</tbody>
		</table>

	</div>

	<div class="tableFixHead3">
	  <table id="userEditTable">
		<tr>
			<td style="color:black; background-color:#f0f8ff">Scan Tray and Sample(s)</td>
			<td style="color:black; background-color:#f0f8ff"><input type="text" id="scanData" name="scanData" maxlength="10" autofocus></td>
		</tr>

	  </table>
	</div>

	<div id="sampleScan" class="grid-container">
		 <div class="grid-item" align="center"><button class="button"  onclick='processScanData(document.getElementById("scanData").value)'>Add</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="confirmDeleteSample()">Delete</button></div>
	</div>

	<div class="grid-container">
  		 <div class="grid-item" align="center"><button class="button" onclick="trayMenu()">&lt;Back</button></div>
  		 <div class="grid-item" align="center"><button class="button" onclick="refreshSample()">Refresh</button></div>

	</div>

</body>

<script>

   document.getElementById('panelValue').innerHTML = sessionStorage.getItem('selectedPanel');
   document.getElementById('traySeqValue').innerHTML =  sessionStorage.getItem('selectedTraySeq');

	var barcode = document.getElementById("scanData");
	barcode.addEventListener("keydown", function (e) {
		if (e.code === "Enter") {  //checks whether the pressed key is "Enter"
			processScanData(document.getElementById("scanData").value);
			document.getElementById('scanData').value = "";
		}
	});

	function processScanData(data)
	{
		if (data != null)
		{
			data = data.toUpperCase();

			if (data.startsWith("TRAY"))
			{
				const m = data.match(/\d+/);
				const n = m ? Number(m[0]) : null;   // 124 (or null if no number found)

				if (n != null)
				{
					sampleListSave('selectedTraySeq', n);
					refreshSample();
				}
			}
			else
			{
				const isNumeric = (string) => /^[+-]?\d+(\.\d+)?$/.test(data);

				if (isNumeric)
				{
					loadSample(data,'samples.html');
				}
			}
		}
	}

	function buildSampleTable() {

		var panel = sessionStorage.getItem('selectedPanel');
		var sequence = sessionStorage.getItem('selectedTraySeq');


		fetch(getContextPath()+"/TraySamples?trayID=0&traySequence="+sequence+"&panelID="+panel+"&queryType=TraySequence")
			.then(function(response) { return response.json(); })
			.then(function(samples) {
				let placeholder = document.querySelector("#sampleTable-output");
				let out = "";
				for (let sample of samples) {
					out += `
			<tr>
				<td style="color:black; background-color:#f0f8ff"><input type="radio" id="${sample.sampleID}" name="sampleSelectList" onchange="sampleListSave('selectedSample',${sample.sampleID});" value="${sample.sampleID}" ` + sampleListGet('selectedTray', sample.sampleID) + `>  <label for="${sample.sampleID}"> (${sample.sequenceLetter})  ${sample.sampleID}</label></td>
				<td style="color:black; background-color:#f0f8ff">${sample.sequenceID}</td>
			</tr>`;
				}

				placeholder.innerHTML = out;
			})
			setFocusScanData();

	}

	function confirmDeleteSample() {

		var selectedSample = sessionStorage.getItem('selectedSample');

		if (selectedSample !== null)
		{
			if (selectedSample)
			{
				if (selectedSample !== '')
				{
					var result =  confirm("Delete Sample ["+selectedSample+"] ?");
					if (result == true)
					{
						deleteSample();
					}
				}
			}
		}
	}

	function setFocusScanData() {
		setTimeout(() => {
		    const inputField = document.getElementById('scanData');
		    inputField.focus();
		  }, 1000);
	}

</script>

</html>
